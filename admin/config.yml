backend:
  name: git-gateway
  branch: main

# Onde ficam os uploads feitos "avulsos" pelo editor de rich text (não usado aqui,
# mas exigido pelo schema do Decap CMS).
media_folder: "imagens"
public_folder: "/imagens"

# O painel some sozinho quando um deploy está rodando; não precisa mexer aqui.
publish_mode: simple

collections:
  - name: "galerias"
    label: "Galerias de Fotos"
    files:
      - name: "mesas_e_cadeiras"
        label: "Mesas e Cadeiras"
        file: "content/galerias/mesas-e-cadeiras.yml"
        fields:
          - { label: "Título da página", name: "titulo", widget: "string" }
          - label: "Fotos"
            name: "imagens"
            widget: "list"
            summary: "{{fields.imagem}}"
            field:
              label: "Foto"
              name: "imagem"
              widget: "image"
              media_folder: "/imagens/mesas e cadeiras"
              public_folder: "/imagens/mesas e cadeiras"

      - name: "utensilios_de_mesa"
        label: "Utensílios de Mesa"

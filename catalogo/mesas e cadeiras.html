    <script>
        async function carregarGaleria() {
            const url = "https://api.github.com/repos/sitedfestas-alt/dfestas/contents/imagens/mesas%20e%20cadeiras";

            try {
                const resposta = await fetch(url);
                const arquivos = await resposta.json();

                const container = document.getElementById("galeria");

                // limpa tudo antes
                container.innerHTML = "";

                arquivos.forEach(arquivo => {
                    // filtra só imagens
                    if (
                        arquivo.type === "file" &&
                        arquivo.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)
                    ) {
                        const div = document.createElement("div");
                        div.className = "item-galeria";

                        const img = document.createElement("img");
                        img.src = arquivo.download_url;
                        img.alt = arquivo.name;

                        const label = document.createElement("label");
                        label.textContent = "";

                        div.appendChild(img);
                        div.appendChild(label);

                        container.appendChild(div);
                    }
                });

            } catch (erro) {
                console.error("Erro ao carregar imagens:", erro);
            }
        }

        carregarGaleria();
    </script>
